<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frekwencja drużyny</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <img src="herb.png" alt="Herb Klubu" class="club-logo">
            <div class="logo-placeholder">⚽</div>
            <h1>Frekwencja drużyny</h1>
            <p>Rejestracja obecności zawodników</p>
            <p><a href="stats.html" style="color:#ff5252; font-weight:600;">📊 Zobacz statystyki →</a></p>
        </header>

        <div class="card">
            <label>Data jednostki</label>
            <input type="date" id="date">

            <label>Typ jednostki</label>
            <select id="type">
                <option>Trening</option>
                <option>Sparing</option>
                <option>Mecz ligowy</option>
                <option>Turniej</option>
            </select>

            <h2>Zawodnicy</h2>
            <div id="players"></div>

            <button id="saveBtn">Zapisz obecność</button>
        </div>

        <!-- NOWA SEKCJA - DODAWANIE ZAWODNIKA -->
        <div class="card" style="margin-top:25px;">
            <h2>➕ Dodaj nowego zawodnika</h2>
            <label>Imię i nazwisko</label>
            <input type="text" id="newName" placeholder="np. Jan Kowalski">
            
            <label>Rok urodzenia</label>
            <input type="text" id="newBirth" placeholder="np. 2013">
            
            <button id="addPlayerBtn">Dodaj zawodnika</button>
        </div>

        <footer>System Frekwencji © 2026</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
