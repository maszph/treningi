<!DOCTYPE html>
<html lang="pl">

    <title>System Frekwencji</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>

    <header>

        <h1>⚽ System Frekwencji</h1>

        <p>Zarządzanie obecnościami na treningach</p>

    <section class="card">

        <h2>Wybierz grupę</h2>

        <select id="group">

            <option>Orlik</option>
            <option>Młodzik</option>
            <option>Trampkarz</option>
            <option>Junior</option>

        <h2>Data treningu</h2>

        <input type="date" id="date">

        <button id="startBtn">

            Rozpocznij

        </button>

    </section>

    <footer>

        Projekt Frekwencja © 2026

    </footer>

<script src="script.js"></script>
